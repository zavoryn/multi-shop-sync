# Prod profile：使用 MySQL，敏感字段通过环境变量注入
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:multi_shop_sync}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: "${DB_USER:}"
    password: "${DB_PASSWORD:}"
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
  # 生产环境 schema 由 DBA 维护或 flyway/liquibase 管理，禁用启动初始化
  sql:
    init:
      mode: never

logging:
  level:
    com.github.multiplatform.sync: INFO
