server:
  port: 8080

spring:
  application:
    name: multi-channel-product-sync
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null

# ============================================================
# 多渠道配置占位（敏感字段必须通过环境变量或 profile 覆盖注入）
# ============================================================
channel:
  douyin:
    enabled: false
    app-key: "${DOUYIN_APP_KEY:}"
    app-secret: "${DOUYIN_APP_SECRET:}"
    refresh-token: "${DOUYIN_REFRESH_TOKEN:}"

  xiaohongshu:
    enabled: false
    app-id: "${XHS_APP_ID:}"
    app-secret: "${XHS_APP_SECRET:}"
    refresh-token: "${XHS_REFRESH_TOKEN:}"

  wechat:
    enabled: false
    app-id: "${WECHAT_APP_ID:}"
    app-secret: "${WECHAT_APP_SECRET:}"
    # 微信小店回调验签所需
    callback-token: "${WECHAT_CALLBACK_TOKEN:}"
    encoding-aes-key: "${WECHAT_ENCODING_AES_KEY:}"

# Resilience4j 限流（per-channel 实例化）
# 抖音:    https://op.jinritemai.com/docs/guide-docs/14/2270  限频 60/min
# 小红书:  默认保守值 600/min，具体以官方文档为准
# 微信:    https://developers.weixin.qq.com/doc/   50/s（部分接口）
resilience4j:
  ratelimiter:
    instances:
      douyin:
        limit-for-period: 60
        limit-refresh-period: 60s
        timeout-duration: 5s
      xiaohongshu:
        limit-for-period: 600
        limit-refresh-period: 60s
        timeout-duration: 5s
      wechat:
        limit-for-period: 50
        limit-refresh-period: 1s
        timeout-duration: 5s

# MyBatis-Plus 全局
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: null

logging:
  level:
    com.github.multiplatform.sync: DEBUG
    com.baomidou.mybatisplus: WARN
