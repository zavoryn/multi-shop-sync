# Dev profile：使用 H2 内存库，无须本地 MySQL
spring:
  datasource:
    url: jdbc:h2:mem:multi_shop_sync;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: false
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.github.multiplatform.sync: DEBUG
